    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1.5rem; }

    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-restart { background: var(--text-light); color: white; width: 100%; margin-top: 2rem; }

    /* Quiz Styles */
    .hidden { display: none; }
    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .progress-text { font-size: 0.9rem; color: var(--text-light); }
    .score-text { font-weight: bold; color: var(--primary); }

    .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; }
    .options-container { display: flex; flex-direction: column; gap: 0.75rem; }
    .option-label { display: flex; align-items: center; padding: 1rem; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .option-label:hover { border-color: var(--primary); background: #f0f7ff; }
    .option-label input { margin-right: 1rem; width: 18px; height: 18px; }

    /* Feedback Colors */
    .correct { border-color: var(--success) !important; background-color: #f0fdf4 !important; }
    .wrong { border-color: var(--error) !important; background-color: #fef2f2 !important; }

    .quiz-footer { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
    .nav-btn { flex: 1; }

    @media (max-width: 600px) {
        .card { padding: 1.5rem; }
        .menu-grid { grid-template-columns: 1fr 1fr; }

</style>
</head>

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answeredQuestions = new Set();

function startQuiz(start, end) {
let selected = allQuestionsData.slice(start, end);
// Shuffle selected section
currentQuestions = selected.sort(() => Math.random() - 0.5);

currentIndex = 0;
score = 0;
answeredQuestions = new Set();

document.getElementById('section-screen').classList.add('hidden');
document.getElementById('quiz-screen').classList.remove('hidden');

showQuestion();
updateHeader();
}

function showQuestion() {
const qData = currentQuestions[currentIndex];
const container = document.getElementById('options');
const qText = document.getElementById('question');

qText.innerText = qData.question;
container.innerHTML = '';

qData.options.forEach((opt, index) => {
const label = document.createElement('label');
label.className = 'option-label';
label.id = `option-${index}`;

const radio = document.createElement('input');
radio.type = 'radio';
radio.name = 'quiz-option';
radio.value = index;

label.appendChild(radio);
label.appendChild(document.createTextNode(opt));
container.appendChild(label);
});

// Toggle buttons
document.getElementById('check-btn').classList.remove('hidden');
document.getElementById('next-btn').disabled = (currentIndex === currentQuestions.length - 1);
document.getElementById('prev-btn').disabled = (currentIndex === 0);
}

function checkAnswer() {
const selected = document.querySelector('input[name="quiz-option"]:checked');
if (!selected) {
alert("Please select an answer first!");
return;
}

const userIdx = parseInt(selected.value);
const correctIdx = currentQuestions[currentIndex].correctIndex;

const labels = document.querySelectorAll('.option-label');
labels.forEach(l => l.style.pointerEvents = 'none'); // Disable clicking after check

if (userIdx === correctIdx) {
labels[userIdx].classList.add('correct');
if (!answeredQuestions.has(currentIndex)) {
score++;
answeredQuestions.add(currentIndex);
}
} else {
labels[userIdx].classList.add('wrong');
labels[correctIdx].classList.add('correct');
answeredQuestions.add(currentIndex); // Mark as answered so no double score later
}

updateHeader();
document.getElementById('check-btn').classList.add('hidden');
}

function changeQuestion(step) {
currentIndex += step;
if (currentIndex < 0) currentIndex = 0;
if (currentIndex >= currentQuestions.length) currentIndex = currentQuestions.length - 1;

showQuestion();
updateHeader();
}

function updateHeader() {
document.getElementById('progress').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
document.getElementById('score').innerText = `Score: ${score}`;
}

function restartQuiz() {
document.getElementById('quiz-screen').classList.add('hidden');
document.getElementById('section-screen').classList.remove('hidden');
}
</script>
